name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar todos los plugins
        run: ./gradlew makePluginsJson
        env:
          GITHUB_REPOSITORY: davidabsenta/LatinoAbs

      - name: Publicar en rama builds
        run: |
          mkdir -p builds
          find . -name "*.cs3" -not -path "./builds/*" -exec cp {} builds/ \;
          cp build/plugins.json builds/plugins.json
          cat > builds/repo.json << 'REPOJSON'
          {
            "name": "LatinoAbs",
            "description": "Providers en español",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/davidabsenta/LatinoAbs/builds/plugins.json"
            ]
          }
          REPOJSON
          cd builds
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b builds
          git add .
          git commit -m "update builds"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/davidabsenta/LatinoAbs.git builds
