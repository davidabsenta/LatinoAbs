name: Build Plugins

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar todos los plugins
        run: ./gradlew assembleRelease
        env:
          GITHUB_REPOSITORY: davidabsenta/LatinoAbs

      - name: Buscar cs3 y generar site
        run: |
          mkdir -p site
          echo "Buscando archivos .cs3..."
          find . -name "*.cs3" -print
          find . -name "*.cs3" -exec cp {} site/ \;
          echo "Archivos en site/:"
          ls -la site/
          
          cd site
          echo "[" > index.json
          first=true
          for cs3 in *.cs3; do
            [ -f "$cs3" ] || continue
            name=$(basename "$cs3" .cs3)
            url="https://davidabsenta.github.io/LatinoAbs/${cs3}"
            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> index.json
            fi
            echo "{\"name\":\"$name\",\"url\":\"$url\",\"status\":2,\"version\":1}" >> index.json
          done
          echo "]" >> index.json
          cat index.json

      - name: Publicar en GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
