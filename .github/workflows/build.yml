name: Build Plugins

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar todos los plugins
        run: ./gradlew assembleRelease

      - name: Recolectar archivos cs3
        run: |
          mkdir -p outputs
          find . -name "*.cs3" | while read f; do
            cp "$f" outputs/
          done
          ls -la outputs/

      - name: Subir cs3 como artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugins-cs3
          path: outputs/*.cs3
          if-no-files-found: warn
